name: Security scan

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/security-scan.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/security-scan.yml'

jobs:
  bandit:
    name: Bandit (backend SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install bandit
        run: pip install 'bandit~=1.7'

      - name: Run bandit on backend/app
        run: bandit -r backend/app -ll -x backend/app/tests

  pip-audit:
    name: pip-audit (backend deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pip-audit
        run: pip install 'pip-audit~=2.7'

      # Ignore list mirrors the "Accepted CVEs" table in SECURITY.md.
      # Each ID is justified there; revisit when Python is upgraded to 3.11
      # (see audit-fixes I-008) — most can be dropped at that point.
      - name: Audit pinned requirements
        run: |
          pip-audit \
            --requirement backend/requirements.txt \
            --ignore-vuln GHSA-wp53-j4wj-2cfg \
            --ignore-vuln GHSA-mj87-hwqh-73pj \
            --ignore-vuln GHSA-mf9w-mj56-hr94 \
            --ignore-vuln GHSA-6w46-j5rx-g56g

  npm-audit:
    name: npm audit (frontend deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: npm audit (production deps, high+ only)
        run: npm audit --omit=dev --audit-level=high
        working-directory: frontend

  bundle-size:
    name: Bundle size guard (frontend)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Check bundle size
        run: node scripts/check-bundle-size.js
        working-directory: frontend
