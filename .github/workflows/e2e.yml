name: e2e

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/e2e.yml'

jobs:
  playwright:
    name: Playwright e2e
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Create backend venv and install deps
        run: |
          python -m venv backend/.venv
          backend/.venv/bin/pip install --upgrade pip
          backend/.venv/bin/pip install --require-hashes -r backend/requirements.txt

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      # Cache the chromium binary across runs; key on package-lock so a Playwright
      # version bump (recorded in lockfile) invalidates automatically.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browser (chromium)
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      # Even on cache hit we still need OS deps (libnss3 etc.) installed.
      - name: Install Playwright OS deps (cache hit path)
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        working-directory: frontend

      - name: Run Playwright tests
        run: npm run e2e
        working-directory: frontend

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14
